<section class="auth-shell">
  <div class="auth-card">
    <header class="auth-header">
      <p class="eyebrow">Welcome back</p>
      <h1>Log in to continue</h1>
      <p>Pick up where you left off and view your eligibility dashboard.</p>
    </header>

    <form [formGroup]="form" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="you@example.com" required />
        <mat-error *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" required />
        <button mat-button type="button" matSuffix class="toggle-btn" (click)="togglePassword()" aria-label="Toggle password visibility">
          <span class="icon-eye" [class.is-off]="showPassword">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5C7 5 3 8.4 1.5 12c1.5 3.6 5.5 7 10.5 7s9-3.4 10.5-7C21 8.4 17 5 12 5zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"
                fill="currentColor"
              />
            </svg>
            <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3.3 4.7 2 6l3.2 3.2C3.6 10.2 2.3 11.6 1.5 12c1.5 3.6 5.5 7 10.5 7 1.7 0 3.3-.4 4.7-1l3.8 3.8 1.3-1.3L3.3 4.7zM12 8a4 4 0 0 1 4 4c0 .7-.2 1.4-.5 2l-5.5-5.5c.6-.3 1.3-.5 2-.5zm0 8a4 4 0 0 1-4-4c0-.7.2-1.4.5-2l5.5 5.5c-.6.3-1.3.5-2 .5zm9.2-4c-.7 1.7-2 3.3-3.8 4.4l-1.5-1.5c1.4-1 2.5-2.4 3.1-3.9-.8-1.8-2.3-3.4-4.3-4.4l-1.3-1.3c2.9 1.2 5.2 3.5 6.1 6.7z"
                fill="currentColor"
              />
            </svg>
          </span>
        </button>
        <mat-error *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password must be at least 6 characters.
        </mat-error>
      </mat-form-field>

      <div class="auth-row">
        <a class="text-link" href="#">Forgot Password?</a>
      </div>

      <button mat-raised-button color="primary" (click)="submit()">Log in</button>
      <button mat-stroked-button type="button" class="google-btn">Continue with Google</button>

      <p class="switch-link">New here? <a routerLink="/signup">Create an account</a></p>
    </form>
  </div>
</section>
