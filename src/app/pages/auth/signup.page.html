<section class="auth-section">
  <div class="auth-card">
    <div class="eyebrow">Get Started</div>
    <h2>Create your account</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label for="fullName">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="fullName" formControlName="fullName" placeholder="Your full name">
        </div>
        <span class="field-error" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('required')">Full name is required.</span>
        <span class="field-error" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('minlength')">Name must be at least 2 characters.</span>
      </div>

      <div class="field-group">
        <label for="regEmail">Email</label>
        <div class="input-wrap">
          <input type="email" id="regEmail" formControlName="email" placeholder="you@example.com">
        </div>
        <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">Email is required.</span>
        <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Enter a valid email address.</span>
      </div>

      <div class="field-group">
        <label for="regPw">Password</label>
        <div class="input-wrap">
          <input [type]="showPassword ? 'text' : 'password'" id="regPw" formControlName="password" placeholder="Create a password">
          <button type="button" class="toggle-pw" (click)="togglePassword()">{{ showPassword ? 'Hide' : 'Show' }}</button>
        </div>
        <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">Password is required.</span>
        <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">Password must be at least 6 characters.</span>
      </div>

      <div class="field-group">
        <label for="regPwConfirm">Confirm Password</label>
        <div class="input-wrap">
          <input [type]="showConfirmPassword ? 'text' : 'password'" id="regPwConfirm" formControlName="confirmPassword" placeholder="Re-enter your password">
          <button type="button" class="toggle-pw" (click)="toggleConfirmPassword()">{{ showConfirmPassword ? 'Hide' : 'Show' }}</button>
        </div>
        <span class="field-error" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.hasError('required')">Please confirm your password.</span>
        <span class="field-error" *ngIf="form.get('confirmPassword')?.touched && form.hasError('passwordMismatch')">Passwords do not match.</span>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="terms" formControlName="agreeTerms">
        <label for="terms">I agree to CampusYar's <a href="#" class="link-accent">Terms of Service</a> and <a href="#" class="link-accent">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="divider">or</div>

    <button type="button" class="btn-google" (click)="continueWithGoogle()">
      <svg class="google-g" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5S44.5 36.3 44.5 25c0-1.5-.2-2.9-.4-4.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4.5 24 4.5c-7.4 0-13.7 4.2-16.9 10.2z"/><path fill="#4CAF50" d="M24 45.5c5.5 0 10.4-1.9 14.2-5l-6.6-5.4c-2 1.4-4.6 2.4-7.6 2.4-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.4 41.3 16.1 45.5 24 45.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.6 5.4c-.5.4 7-5.1 7-13.9 0-1.5-.2-2.9-.4-4.5z"/></svg>
      Continue with Google
    </button>

    <div class="switch-line">Already have an account? <a routerLink="/login">Log in</a></div>
  </div>
</section>
