<section class="universities-shell">
  <header class="universities-header">
    <h1>International Programmes in Germany 2025/2026</h1>
    <p>Choose your programme!</p>
  </header>

  <div class="universities-panel">
    <div class="universities-search">
      <input class="universities-input" type="text" placeholder="Search" />
    </div>

    <div class="universities-filters">
      <div class="filter-field">
        <label for="courseType">Course Type</label>
        <select id="courseType">
          <option selected>Please select...</option>
          <option>Bachelor's degree (368)</option>
          <option>Master's degree (1717)</option>
          <option>PhD / Doctorate (166)</option>
          <option>Cross-faculty graduate and research school (26)</option>
          <option>Prep course / Studienkolleg (42)</option>
          <option>Language course (123)</option>
          <option>Short course (120)</option>
          <option>Joint degree / double degree programme (467)</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="courseLanguage">Course Language</label>
        <select id="courseLanguage">
          <option selected>Please select...</option>
          <option>German only (183)</option>
          <option>English only (2012)</option>
          <option>German &amp; English (247)</option>
          <option>Other (93)</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="subjectGroup">Subject Groups</label>
        <select id="subjectGroup">
          <option selected>Please select...</option>
          <option>Agricultural and Forest Sciences (91)</option>
          <option>Art, Music, Design (87)</option>
          <option>Economic Sciences, Law (705)</option>
          <option>Engineering Sciences (646)</option>
          <option>Humanities and Social Sciences (331)</option>
          <option>Language and Cultural Studies (430)</option>
          <option>Mathematics, Natural Sciences (939)</option>
          <option>Medicine, Health Sciences (112)</option>
          <option>Public Administration (3)</option>
          <option>Teaching Degrees (7)</option>
        </select>
      </div>
      <div class="filter-action">
        <span class="program-count">2,814 programmes available</span>
        <button class="btn-primary" type="button">Search</button>
      </div>
    </div>
  </div>
</section>
