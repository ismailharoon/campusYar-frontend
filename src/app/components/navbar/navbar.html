<header class="nav-shell">
  <nav role="navigation" aria-label="Main Navigation">
    <div class="top-row">
      <div class="wrap">
        <a class="logo" routerLink="/" (click)="scrollToTop()" style="text-decoration: none;">
          <div class="logo-mark">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="display: block;">
              <circle cx="11" cy="8" r="4.5" fill="white" />
              <path d="M3 18 Q11 13 19 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" />
            </svg>
          </div>
          <span class="logo-name">CampusYar</span>
        </a>
        <div class="auth-buttons">
          <ng-container *ngIf="!isLoggedIn(); else authenticated">
            <a routerLink="/login" class="login-link">Log in</a>
          </ng-container>
          <ng-template #authenticated>
            <div class="auth-logged-in">
              <a routerLink="/dashboard" class="login-link">Dashboard</a>
              <button (click)="logout()" class="logout-btn">Log out</button>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
    
    <div class="nav-band">
      <div class="wrap">
        <div class="nav-links">
          <a routerLink="/eligibility" routerLinkActive="active">Plan Your Studies</a>
          <a routerLink="/universities" routerLinkActive="active">University Finder</a>
          <a class="guides-toggle" href="javascript:void(0)" (click)="toggleGuides($event)" [attr.aria-expanded]="guidesOpen">
            Pathways <span class="caret">▾</span>
          </a>
          <a href="#">Living in Germany</a>
          <a href="#">Guides</a>
          <a href="#">Checklist</a>
        </div>
        <div class="search-icon"></div>
      </div>
    </div>
  </nav>

  <div class="guides-backdrop" *ngIf="guidesOpen" (click)="closeGuides()"></div>
  <div class="guides-dropdown" *ngIf="guidesOpen" [@slideDown]>
    <div class="guides-inner">
      <div class="guides-header">
        <span class="guides-title">Pathways</span>
        <button class="guides-close" type="button" (click)="closeGuides()" aria-label="Close Dropdown">&times;</button>
      </div>
      <div class="guides-list">
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Study &amp; research in Germany</span><span class="guides-plus">+</span></a>
        <a class="guides-row" routerLink="/universities" (click)="closeGuides()"><span>Universities &amp; Programmes</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Scholarships &amp; Funding</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Requirements &amp; Enrolment</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Living in Germany</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Work &amp; Career</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>PhD Studies &amp; Research</span><span class="guides-plus">+</span></a>
        <a class="guides-row" href="#" (click)="closeGuides()"><span>Advisory Service</span><span class="guides-plus">+</span></a>
      </div>
    </div>
  </div>
</header>
